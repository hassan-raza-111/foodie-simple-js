<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Foodie</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Food<span>ie</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="service.html">Services</a>
      </div>
      <div class="nav-auth"></div>
      <div class="hamburger">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Sign In Section -->
  <section class="auth-section">
    <div class="auth-card">
      <h1>Sign In</h1>
      <p class="auth-subtitle">Welcome back!</p>

      <div id="auth-error" class="auth-message auth-error" style="display:none;"></div>

      <form id="signin-form" onsubmit="handleSignin(event)">
        <div class="form-group" id="fg-email">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email">
          <span class="error-text">Please enter a valid email</span>
        </div>
        <div class="form-group" id="fg-password">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password">
          <span class="error-text">Please enter your password</span>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Foodie. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    function handleSignin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      document.getElementById('fg-email').classList.remove('error');
      document.getElementById('fg-password').classList.remove('error');
      document.getElementById('auth-error').style.display = 'none';

      if (!email) {
        document.getElementById('fg-email').classList.add('error');
        valid = false;
      }
      if (!password) {
        document.getElementById('fg-password').classList.add('error');
        valid = false;
      }
      if (!valid) return;

      const result = Auth.signin(email, password);
      if (!result.success) {
        const err = document.getElementById('auth-error');
        err.textContent = result.message;
        err.style.display = 'block';
        return;
      }

      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
