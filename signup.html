<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Foodie</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Food<span>ie</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="service.html">Services</a>
      </div>
      <div class="nav-auth"></div>
      <div class="hamburger">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- Sign Up Section -->
  <section class="auth-section">
    <div class="auth-card">
      <h1>Sign Up</h1>
      <p class="auth-subtitle">Create your account to get started.</p>

      <div id="auth-error" class="auth-message auth-error" style="display:none;"></div>

      <form id="signup-form" onsubmit="handleSignup(event)">
        <div class="form-group" id="fg-name">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Enter your name">
          <span class="error-text">Please enter your name</span>
        </div>
        <div class="form-group" id="fg-email">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email">
          <span class="error-text">Please enter a valid email</span>
        </div>
        <div class="form-group" id="fg-password">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password (min 6 chars)">
          <span class="error-text">Password must be at least 6 characters</span>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign Up</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="signin.html">Sign In</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Foodie. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    function handleSignup(e) {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      document.getElementById('fg-name').classList.remove('error');
      document.getElementById('fg-email').classList.remove('error');
      document.getElementById('fg-password').classList.remove('error');
      document.getElementById('auth-error').style.display = 'none';

      if (!name) {
        document.getElementById('fg-name').classList.add('error');
        valid = false;
      }
      if (!email) {
        document.getElementById('fg-email').classList.add('error');
        valid = false;
      }
      if (password.length < 6) {
        document.getElementById('fg-password').classList.add('error');
        valid = false;
      }
      if (!valid) return;

      const result = Auth.signup(name, email, password);
      if (!result.success) {
        const err = document.getElementById('auth-error');
        err.textContent = result.message;
        err.style.display = 'block';
        return;
      }

      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
